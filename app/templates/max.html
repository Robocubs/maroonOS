<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/dashboardStyles.css">
    <link rel="stylesheet" href="/static/maxDashboardStyles.css">
    <title>maroonOS - Max Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.js"></script>
</head>
<body>

<div id="overlay"></div>

<div id="panels">
    {% macro panel() %}
    <div class="panel">
        <div class="panel-inner">
            {% include '_panel.html' %}
        </div>
    </div>
    {% endmacro %}

    {{ panel() }}
    {{ panel() }}
    {{ panel() }}
</div>

<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});</script>
<script src="/static/screensaverPlayer.js"></script>
<script src="/static/dashboard.js"></script>
<script src="/static/maxDashboard.js"></script>
<script>initMax({{ printer_ids | tojson }});</script>
<script>
// TEMPORARY DEBUG — remove once the CPU-ramp investigation is done.
setInterval(() => {
    const v = document.querySelectorAll('video').length;
    const i = document.querySelectorAll('img').length;
    const mem = performance.memory
        ? Math.round(performance.memory.usedJSHeapSize / 1048576)
        : 'na';
    fetch(`/__DEBUG__/video${v}_img${i}_heapMB${mem}_t${Date.now()}`).catch(() => {});
}, 5000);
</script>
</body>
</html>
