<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/dashboardStyles.css">
    <link rel="stylesheet" href="/static/maxDashboardStyles.css">
    <title>maroonOS - Max Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.js"></script>
</head>
<body>

<div id="overlay">
    <video autoplay muted loop>
        <source src="/static/videos/LandscapeAnniversary1080p.webm" type="video/webm">
    </video>
</div>

<div id="panels">
    {% macro panel() %}
    <div class="panel">
        <div class="panel-inner">
            {% include '_panel.html' %}
        </div>
    </div>
    {% endmacro %}

    {{ panel() }}
    {{ panel() }}
    {{ panel() }}
</div>

<script src="/static/dashboard.js"></script>
<script src="/static/maxDashboard.js"></script>
<script>initMax({{ printer_ids | tojson }});</script>
</body>
</html>
