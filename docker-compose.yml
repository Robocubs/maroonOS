services:

  # Single-printer:    MODE=reg docker compose up
  # Three-printer:     MODE=max docker compose up
  # Local dev:         DEV_MODE=true docker compose up
  server:
    build:
      context: ./app
    ports:
      - "8080:8080"
    environment:
      - DEV_MODE=${DEV_MODE:-false}
      - MODE=${MODE:-reg}
      # Comma-separated IPs/hostnames of other Pis to push playlist changes to
      # and compare screensaver sync against (port 8080 assumed).
      - PEER_IPS=${PEER_IPS:-}
    volumes:
      - ./app/config:/app/config
      - ./app/static/videos:/app/static/videos
      - ./app/static/images:/app/static/images
    restart: unless-stopped
